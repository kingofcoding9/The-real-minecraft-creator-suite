<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Addon Share Bridge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full glass rounded-3xl p-8 shadow-2xl">
        <div class="text-center mb-6">
            <div class="inline-block p-4 bg-amber-500/10 rounded-2xl mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
                </svg>
            </div>
            <h1 class="text-2xl font-extrabold tracking-tight">OS Share Bridge</h1>
            <p class="text-sm text-slate-400 mt-2">Uses Android's Native Share menu to securely hand the file directly to Minecraft.</p>
        </div>

        <div class="space-y-6">
            <!-- File Selection -->
            <div class="p-4 border-2 border-dashed border-slate-600 rounded-xl bg-slate-800/50 text-center relative overflow-hidden transition-colors" id="dropZone">
                <input type="file" id="addonFile" accept=".mcaddon,.mcpack,.mcworld" 
                    class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                <div id="uploadUI">
                    <p class="text-slate-300 font-semibold mb-1">1. Select your file</p>
                    <p class="text-xs text-slate-500">Tap to browse</p>
                </div>
                <div id="successUI" class="hidden">
                    <p class="text-amber-400 font-bold" id="fileNameDisplay">File Ready!</p>
                </div>
            </div>

            <!-- Action Button -->
            <button onclick="shareToMinecraft()" id="mainBtn" disabled
                class="w-full py-4 rounded-xl font-bold text-lg bg-amber-600 hover:bg-amber-500 transition-all transform active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed shadow-lg shadow-amber-900/20 flex items-center justify-center gap-2">
                <span>2. Share to Minecraft</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M11 3a1 1 0 100 2h2.586l-6.293 6.293a1 1 0 101.414 1.414L15 6.414V9a1 1 0 102 0V4a1 1 0 00-1-1h-5z" />
                    <path d="M5 5a2 2 0 00-2 2v8a2 2 0 002 2h8a2 2 0 002-2v-3a1 1 0 10-2 0v3H5V7h3a1 1 0 000-2H5z" />
                </svg>
            </button>

            <!-- Error Box -->
            <div id="errorBox" class="hidden bg-red-500/10 p-4 rounded-xl border border-red-500/20 text-sm text-red-400 text-center">
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('addonFile');
        const mainBtn = document.getElementById('mainBtn');
        const uploadUI = document.getElementById('uploadUI');
        const successUI = document.getElementById('successUI');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const dropZone = document.getElementById('dropZone');
        const errorBox = document.getElementById('errorBox');

        let selectedFile = null;

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                fileNameDisplay.innerText = selectedFile.name;
                uploadUI.classList.add('hidden');
                successUI.classList.remove('hidden');
                mainBtn.disabled = false;
                
                dropZone.classList.remove('border-slate-600');
                dropZone.classList.add('border-amber-500', 'bg-amber-500/10');
                errorBox.classList.add('hidden');
            }
        });

        async function shareToMinecraft() {
            if (!selectedFile) return;

            // We create a fresh File object to ensure no weird browser-cache data corrupts it
            const cleanFile = new File([selectedFile], selectedFile.name, {
                type: selectedFile.type || 'application/octet-stream'
            });

            const shareData = {
                title: 'Import Addon',
                text: 'Importing ' + selectedFile.name,
                files: [cleanFile]
            };

            // Check if the browser/device supports the Web Share API for files
            if (navigator.canShare && navigator.canShare(shareData)) {
                try {
                    await navigator.share(shareData);
                    console.log('File shared successfully');
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        showError("Share failed: " + err.message);
                    }
                }
            } else {
                showError("Your browser doesn't support direct file sharing. Please try Chrome on Android.");
            }
        }

        function showError(msg) {
            errorBox.innerText = msg;
            errorBox.classList.remove('hidden');
        }
    </script>
</body>
</html>
